---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: workspace-{{ .Values.tenant.username }}
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.bootstrap.repoURL }}
    targetRevision: {{ .Values.bootstrap.targetRevision }}
    path: tenant/workspace
    helm:
      values: |
        username: {{ .Values.tenant.username }}
        subdomain: {{ .Values.tenant.domain }}
        litellmKey: {{ .Values.tenant.litellmKey }}
  destination:
    name: in-cluster
    namespace: {{ .Values.tenant.username }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
    retry:
      limit: 30
      backoff:
        duration: "5s"
        factor: 2
        maxDuration: "5m"
