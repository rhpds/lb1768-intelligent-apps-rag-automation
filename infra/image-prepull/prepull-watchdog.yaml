# CronJob watchdog that deletes prepull pods stuck in Init for >15 minutes.
#
# DaemonSets do not support activeDeadlineSeconds, so this CronJob acts as
# an external timeout.  When a pod is deleted the DaemonSet controller
# recreates it automatically, giving the image pull a fresh attempt with
# less CRI-O contention.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prepull-watchdog
  namespace: minio
  labels:
    app: prepull-watchdog
    app.kubernetes.io/instance: cluster-bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "3"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: prepull-watchdog
  namespace: minio
  labels:
    app: prepull-watchdog
    app.kubernetes.io/instance: cluster-bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "3"
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: prepull-watchdog
  namespace: minio
  labels:
    app: prepull-watchdog
    app.kubernetes.io/instance: cluster-bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "3"
subjects:
  - kind: ServiceAccount
    name: prepull-watchdog
    namespace: minio
roleRef:
  kind: Role
  name: prepull-watchdog
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: prepull-watchdog
  namespace: minio
  labels:
    app: prepull-watchdog
    app.kubernetes.io/instance: cluster-bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  schedule: "*/5 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      activeDeadlineSeconds: 120
      template:
        spec:
          serviceAccountName: prepull-watchdog
          restartPolicy: Never
          containers:
            - name: watchdog
              image: registry.redhat.io/openshift4/ose-cli:latest
              command:
                - /bin/bash
                - -c
                - |
                  echo "Checking for prepull pods stuck in Init for >15 minutes..."
                  THRESHOLD=900
                  NOW=$(date +%s)
                  STUCK=0
                  for POD in $(oc get pods -n minio -l app=prepull-workshop-images \
                      --field-selector=status.phase!=Succeeded \
                      -o jsonpath='{.items[*].metadata.name}'); do
                    START=$(oc get pod "$POD" -n minio \
                        -o jsonpath='{.status.startTime}')
                    [ -z "$START" ] && continue
                    START_EPOCH=$(date -d "$START" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$START" +%s 2>/dev/null)
                    [ -z "$START_EPOCH" ] && continue
                    AGE=$(( NOW - START_EPOCH ))
                    # Check if pod is still in Init phase (not all init containers done)
                    INIT_READY=$(oc get pod "$POD" -n minio \
                        -o jsonpath='{.status.initContainerStatuses[*].ready}')
                    ALL_DONE=true
                    for STATUS in $INIT_READY; do
                      [ "$STATUS" != "true" ] && ALL_DONE=false && break
                    done
                    if [ "$ALL_DONE" = "false" ] && [ "$AGE" -gt "$THRESHOLD" ]; then
                      echo "Deleting stuck pod $POD (age: ${AGE}s)"
                      oc delete pod "$POD" -n minio --grace-period=30
                      STUCK=$((STUCK + 1))
                    fi
                  done
                  echo "Done. Deleted $STUCK stuck pod(s)."
              resources:
                requests:
                  cpu: "10m"
                  memory: "32Mi"
                limits:
                  cpu: "100m"
                  memory: "64Mi"
